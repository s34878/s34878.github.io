<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แฟ้มสะสมงานของพิมพ์ลภัส</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 50%, #fbc2eb 100%); 
            background-attachment: fixed; 
            text-align: center; 
            padding: 30px; 
            min-height: 100vh;
        }

        .container { max-width: 800px; margin: 0 auto; }
        
        .profile-img { 
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            object-fit: cover; 
            margin-bottom: 20px; 
            border: 3px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .project-card { background: white; padding: 20px; margin: 20px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: left; }
        .btn { display: inline-block; background: #2c3e50; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="my-picture.jpg" alt="พิมพ์ลภัส" class="profile-img">
        
        <h1>📁 แฟ้มสะสมงานของพิมพ์ลภัส</h1>
        <p>นี่คือพื้นที่รวบรวมผลงานและกิจกรรมที่ภูมิใจค่ะ</p>

        <div class="project-card">
            <h3>1. โครงงาน/ชิ้นงานวิทยาศาสตร์คำนวณ</h3>
            <p>รายละเอียดชิ้นงาน: เขียนอธิบายสั้นๆ ว่าทำอะไร ได้เรียนรู้อะไรจากงานนี้บ้าง</p>
        </div>

        <div class="project-card">
            <h3>2. กิจกรรม/เกียรติบัตรที่ได้รับ</h3>
            <p>รายละเอียดชิ้นงาน: เข้าร่วมการประกวด หรือกิจกรรมของโรงเรียน...</p>
        </div>

        <a href="index.html" class="btn">🏠 กลับหน้าแรก</a>
    </div>

</body>
</html>
