<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>หน้าแนะนำตัวของฉัน</title>
    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 50%, #fce4ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            padding: 10px;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 420px;
            padding: 25px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }
        .card-header {
            height: 120px;
            background: linear-gradient(90deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 15px;
            margin-bottom: 60px;
            position: relative;
        }
        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid white;
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: url('myphoto.jpeg') center/cover no-repeat;
        }
        h1 { 
            color: #7b1fa2; 
            font-size: 22px; 
            margin-bottom: 15px; 
        }
        p { 
            font-size: 16px; 
            line-height: 1.6; 
            margin: 15px 0; 
            color: #444;
        }
        .divider {
            height: 2px;
            background: linear-gradient(to right, #f48fb1, #ce93d8, #64b5f6);
            margin: 20px 0;
            border-radius: 2px;
        }
        .btn {
            display: inline-block;
            background: #7b1fa2; 
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 30px;
            margin-top: 25px;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        .btn:hover {
            background: #9c27b0;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header"></div>
        <!-- รูปโปรไฟล์ -->
        <div class="profile-pic"></div>
        <h1>ยินดีต้อนรับสู่โปรไฟล์ของพิมพ์ลภัส (Pimrapat)</h1>
        <p>🎓 ขณะนี้กำลังศึกษาและสนใจด้าน <strong>วิศวกรรมศาสตร์</strong></p>
        <div class="divider"></div>
        <p>🌐 นี่คือเว็บไซต์แรกของดิฉันที่โฮสต์บน <strong>GitHub Pages</strong> ค่ะ</p>
        
        <a href="portfolio.html" class="btn">ดูแฟ้มสะสมงานทางวิศวกรรม</a>
    </div>

</body>
</html>
