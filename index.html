<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>หน้าแนะนำตัวของฉัน</title>
    <style>
        body {
            /* ปรับโทนสีให้เข้มขึ้นเพื่อให้เห็นการไล่เฉดชัดเจนขึ้น */
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 50%, #fce4ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: sans-serif;
            padding: 10px;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
        }
        .card-header {
            height: 100px;
            /* สีแถบไล่เฉดให้ตรงกับภาพ */
            background: linear-gradient(90deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 15px;
            margin-bottom: 25px;
        }
        h1 { 
            color: #7b1fa2; 
            font-size: 22px; 
            margin-bottom: 15px; 
        }
        p { 
            font-size: 16px; 
            line-height: 1.5; 
            margin: 10px 0; 
            color: #555;
        }
        .btn {
            display: block;
            background: #7b1fa2; 
            color: white;
            padding: 15px;
            text-decoration: none;
            border-radius: 30px;
            margin-top: 25px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header"></div>
        <h1>ยินดีต้อนรับสู่โปรไฟล์ของพิมพ์ลภัส (Pimrapat)</h1>
        <p>ขณะนี้กำลังศึกษาและสนใจด้าน<strong>วิศวกรรมศาสตร์</strong>ค่ะ</p>
        <p>นี่คือเว็บไซต์แรกของดิฉันที่โฮสต์บน GitHub Pagesค่ะ</p>
        
        <a href="portfolio.html" class="btn">ดูแฟ้มสะสมงานทางวิศวกรรม</a>
    </div>

</body>
</html>
