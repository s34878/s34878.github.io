<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>หน้าแนะนำตัวของพิมพ์ลภัส</title>
    <style>
        body {
            background: linear-gradient(135deg, #fdfcf0 0%, #e0f7fa 50%, #fce4ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #455a64;
            padding: 20px; /* เพิ่ม Padding รอบนอก */
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px; /* ปรับมุมให้โค้งมนขึ้น */
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); /* เพิ่มเงาให้ดูมีมิติ */
            width: 100%;
            max-width: 450px; /* ขยายความกว้างการ์ด */
            padding: 40px 30px; /* ปรับ Padding ด้านบนล่าง/ซ้ายขวา */
            text-align: center;
            box-sizing: border-box;
        }
        .card-header {
            height: 120px; /* ปรับความสูงส่วนหัวให้สมดุล */
            background: linear-gradient(45deg, #cfd8dc, #b2ebf2, #f8bbd0);
            border-radius: 20px;
            margin-bottom: 30px;
        }
        h1 { 
            color: #0277bd; 
            font-size: 26px; /* ปรับขนาดตัวอักษรให้เด่นขึ้น */
            margin-bottom: 20px; 
        }
        p { 
            font-size: 17px; 
            line-height: 1.7; 
            margin: 12px 0; 
        }
        .btn {
            display: block;
            background: #0288d1;
            color: white;
            padding: 18px; /* ปรับขนาดปุ่มให้กดง่ายขึ้น */
            text-decoration: none;
            border-radius: 40px;
            margin-top: 30px;
            font-weight: bold;
            transition: transform 0.2s, background 0.3s;
        }
        .btn:hover {
            background: #01579b;
            transform: scale(1.02); /* เพิ่มลูกเล่นตอนชี้เมาส์ */
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header"></div>
        <h1>ยินดีต้อนรับสู่โปรไฟล์ของพิมพ์ลภัส (Pimrapat)</h1>
        <p>มีความมุ่งมั่นในการเรียนและสนใจด้าน<strong>วิศวกรรมศาสตร์</strong>เป็นพิเศษค่ะ</p>
        <p>นี่คือเว็บไซต์แรกของดิฉันที่พัฒนาและโฮสต์บน GitHub Pages</p>
        
        <a href="portfolio.html" class="btn">ดูแฟ้มสะสมผลงานทางวิศวกรรม</a>
    </div>

</body>
</html>
