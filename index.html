<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>หน้าแนะนำตัวของพิมพ์ลภัส</title>
    <style>
        body {
            /* โทนสีพาสเทล สบายตาและดูเป็นระเบียบ */
            background: linear-gradient(135deg, #fdfcf0 0%, #e0f7fa 50%, #fce4ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #455a64;
            padding: 10px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            padding: 25px;
            text-align: center;
            box-sizing: border-box;
        }
        .card-header {
            height: 100px;
            background: linear-gradient(45deg, #cfd8dc, #b2ebf2, #f8bbd0);
            border-radius: 15px;
            margin-bottom: 25px;
        }
        h1 { 
            color: #0277bd; 
            font-size: 22px; 
            margin-bottom: 15px; 
        }
        p { 
            font-size: 16px; 
            line-height: 1.6; 
            margin: 10px 0; 
        }
        .btn {
            display: block;
            background: #0288d1;
            color: white;
            padding: 15px;
            text-decoration: none;
            border-radius: 30px;
            margin-top: 25px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #01579b;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header"></div>
        <h1>ยินดีต้อนรับสู่โปรไฟล์ของพิมพ์ลภัส (Pimrapat)</h1>
        <p>มีความมุ่งมั่นในการเรียนและสนใจด้าน<strong>วิศวกรรมศาสตร์</strong>เป็นพิเศษค่ะ</p>
        <p>นี่คือเว็บไซต์แรกของดิฉันที่พัฒนาและโฮสต์บน GitHub Pages</p>
        
        <a href="portfolio.html" class="btn">ดูแฟ้มสะสมผลงานทางวิศวกรรม</a>
    </div>

</body>
</html>
